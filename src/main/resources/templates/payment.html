<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment — Restaurant POS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/">🍽️ RestaurantPOS</a>
    <div class="navbar-nav">
        <a class="nav-link" th:href="@{/tables}">🪑 Tables</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container" style="max-width:700px">
    <div class="page-header" style="margin-top:24px">
        <h1>💳 Payment</h1>
        <p>Table <strong th:text="${order.table.tableNumber}">1</strong>
           &nbsp;|&nbsp; Order <strong th:text="${order.orderNumber}">ORD-001</strong></p>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <!-- Order items summary -->
    <div class="card">
        <div class="card-title">📋 Order Summary</div>
        <table class="data-table">
            <thead>
                <tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}" th:if="!${item.voided}">
                    <td th:text="${item.menuItem.name}">Item</td>
                    <td th:text="${item.quantity}">1</td>
                    <td th:text="${item.unitPrice + '€'}">0.00€</td>
                    <td th:text="${item.lineTotal + '€'}">0.00€</td>
                </tr>
                <tr class="total-row">
                    <td colspan="3"><strong>TOTAL</strong></td>
                    <td><strong th:text="${order.total + '€'}">0.00€</strong></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Payment form -->
    <div class="card">
        <div class="card-title">💰 Select Payment Method</div>
        <form method="post" th:action="@{/payment/process}">
            <input type="hidden" name="orderId" th:value="${order.id}">

            <div class="form-group">
                <label class="form-label">Payment Method</label>
                <div style="display:flex; gap:12px">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; padding:12px 24px; border:2px solid #ddd; border-radius:8px; flex:1; justify-content:center; font-weight:600">
                        <input type="radio" name="method" value="CASH" required> 💵 CASH
                    </label>
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; padding:12px 24px; border:2px solid #ddd; border-radius:8px; flex:1; justify-content:center; font-weight:600">
                        <input type="radio" name="method" value="CARD" required> 💳 CARD
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Discount Amount (€) — optional</label>
                <input type="number" name="discountAmount" class="form-control"
                       placeholder="0.00" min="0" step="0.01" value="0">
            </div>

            <div style="display:flex; gap:12px">
                <a th:href="@{/order/{id}(id=${order.table.id})}" class="btn btn-secondary">← Back</a>
                <button type="submit" class="btn btn-success btn-lg" style="flex:1">
                    ✅ PROCESS PAYMENT
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
