<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pizza Station — Restaurant POS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta http-equiv="refresh" content="30">
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/">🍽️ RestaurantPOS</a>
    <div class="navbar-nav">
        <a class="nav-link" th:href="@{/shift}">⏱ Shift</a>
        <a class="nav-link active" th:href="@{/station/pizza}">🍕 Pizza</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="page-header" style="margin-top:24px; display:flex; justify-content:space-between; align-items:center">
        <div>
            <h1>🍕 Pizza Station</h1>
            <p>Pending pizzas to prepare &nbsp;|&nbsp; Auto-refreshes every 30s</p>
        </div>
        <span class="badge" style="background:#fdf2e9; color:#e67e22; font-size:1rem; padding:8px 16px">
            <span th:text="${#lists.size(items)}">0</span> Pending
        </span>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <div class="card" th:if="${#lists.isEmpty(items)}" style="text-align:center; padding:48px">
        <div style="font-size:3rem">✅</div>
        <h3 style="margin-top:16px; color:#27ae60">Oven is clear!</h3>
        <p style="color:#666">No pending pizza orders.</p>
    </div>

    <div th:each="item : ${items}">
        <div class="station-item pizza">
            <div class="station-item-info">
                <h3 th:text="${item.menuItem.name}">Margherita</h3>
                <p>
                    Table <strong th:text="${item.order.table.tableNumber}">1</strong>
                    &nbsp;|&nbsp;
                    Order <strong th:text="${item.order.orderNumber}">ORD-001</strong>
                    &nbsp;|&nbsp;
                    Qty: <strong th:text="${item.quantity}">1</strong>
                    &nbsp;|&nbsp;
                    <span th:text="${item.unitPrice + '€'}">0.00€</span>
                </p>
                <p th:if="${item.extras}" style="color:#e67e22; margin-top:4px">
                    🧀 Extras: <strong th:text="${item.extras}">extras</strong>
                </p>
                <p th:if="${item.notes}" style="color:#999; margin-top:2px; font-size:0.85rem">
                    📝 Note: <span th:text="${item.notes}">note</span>
                </p>
            </div>
            <form method="post" th:action="@{/station/item/{id}/done(id=${item.id})}">
                <input type="hidden" name="stationPath" value="pizza">
                <button type="submit" class="btn btn-success">✅ DONE</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
